<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | {{ site.title }}</title>
  <!-- Primary Meta Tags -->
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="{{ page.url | absolute_url }}" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{ page.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:site_name" content="{{ site.title }}" />
  {% if page.image %}
  <meta property="og:image" content="{{ page.image | absolute_url }}" />
  <meta name="twitter:image" content="{{ page.image | absolute_url }}" />
  {% elsif site.image %}
  <meta property="og:image" content="{{ site.image | absolute_url }}" />
  <meta name="twitter:image" content="{{ site.image | absolute_url }}" />
  {% endif %}

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ page.title }}" />
  <meta name="twitter:description" content="{{ page.description | default: site.description }}" />
  {% if site.twitter_username %}<meta name="twitter:site" content="@{{ site.twitter_username }}" />{% endif %}
  {% if page.image %}<meta name="twitter:image" content="{{ page.image | absolute_url }}" />{% endif %}

  <!-- JSON-LD structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ page.title }}",
    {% if page.description %}"description": "{{ page.description }}",{% endif %}
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Person",
      "name": "{{ site.author.name | default: site.title }}"
    },
    "publisher": {
      "@type": "Organization",
      "name": "{{ site.title }}"
    }
    {% if page.image %},"image": "{{ page.image | absolute_url }}"{% endif %}
  }
  </script>

  <link href="{{ '/style.css' | relative_url }}" rel="stylesheet" />
</head>
<body>
  <nav>
    <a href="{{ site.baseurl }}/">Home</a> |
    <a href="{{ site.baseurl }}/blog/">Blog</a>
  </nav>
  <main class="container">
    {{ content }}
  </main>
</body>
</html>
